<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obesity Risk Predictor</title>
    <style>
        :root {
            --primary: #4361ee;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            max-width: 800px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }
        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--primary);
        }
        .btn {
            grid-column: 1 / -1;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #3f37c9;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            display: none;
        }
        .likely { background-color: #ffe3e3; color: #c92a2a; border: 1px solid #ffa8a8; }
        .unlikely { background-color: #d3f9d8; color: #2b8a3e; border: 1px solid #8ce99a; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Patient Obesity Predictor</h2>
        <form id="predictionForm" class="form-grid">
            <div class="input-group"><label>Age</label><input type="number" step="0.1" name="age" required></div>
            <div class="input-group"><label>Gender (0=F, 1=M)</label><input type="number" name="gender" required></div>
            <div class="input-group"><label>Height (m)</label><input type="number" step="0.01" name="height" required></div>
            <div class="input-group"><label>Weight (kg)</label><input type="number" step="0.1" name="weight" required></div>
            <div class="input-group"><label>CALC (Encoded)</label><input type="number" name="calc" required></div>
            <div class="input-group"><label>FAVC (Encoded)</label><input type="number" name="favc" required></div>
            <div class="input-group"><label>FCVC</label><input type="number" step="0.1" name="fcvc" required></div>
            <div class="input-group"><label>NCP</label><input type="number" step="0.1" name="ncp" required></div>
            <div class="input-group"><label>CAEC (Encoded)</label><input type="number" name="caec" required></div>
            <div class="input-group"><label>SCC (Encoded)</label><input type="number" name="scc" required></div>
            <div class="input-group"><label>SMOKE (Encoded)</label><input type="number" name="smoke" required></div>
            <div class="input-group"><label>FAF</label><input type="number" step="0.1" name="faf" required></div>
            <div class="input-group"><label>TUE</label><input type="number" step="0.1" name="tue" required></div>
            <div class="input-group"><label>CH2O</label><input type="number" step="0.1" name="ch2o" required></div>
            <div class="input-group"><label>Family History (Encoded)</label><input type="number" name="fam_with_overweight" required></div>
            <div class="input-group"><label>MTRANS (Encoded)</label><input type="number" name="mtrans" required></div>

            <button type="submit" class="btn">Analyze Patient Data</button>
        </form>

        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'block';
            resultBox.textContent = 'Processing...';
            resultBox.className = 'result-box'; 

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            for (let key in data) { data[key] = parseFloat(data[key]); }

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.prediction) {
                    resultBox.textContent = `${result.prediction} (Score: ${result.raw_score.toFixed(4)})`;
                    resultBox.classList.add(result.prediction.includes("likely") ? 'likely' : 'unlikely');
                } else {
                    resultBox.textContent = `Error: ${result.error}`;
                }
            } catch (error) {
                resultBox.textContent = 'Failed to connect to the server.';
            }
        });
    </script>
</body>
</html>
